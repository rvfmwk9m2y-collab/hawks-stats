name: Update Hawks Stats

on:
  schedule:
    # Every Monday at 8am AEST (10pm Sunday UTC) — after weekend games
    - cron: '0 22 * * 0'
  workflow_dispatch:
    # Also allows manual trigger from GitHub website (Actions tab → Run workflow)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data.json
        run: |
          git config user.name  "Hawks Bot"
          git config user.email "hawks-bot@github-actions"
          git add data.json
          git diff --cached --quiet || git commit -m "📊 Stats update $(date +'%Y-%m-%d')"
          git push
