<title>Hawks Stats 2026</title>
<style>
:root {
  --brown: #3D1A06;
  --brown-mid: #5A2D0C;
  --gold: #F2C14E;
  --gold-mid: #D4A030;
  --gold-light: #FDF3D8;
  --gold-pale: #FFFBF0;
  --bg: #F5F0E8;
  --surface: #FFFFFF;
  --border: #E2D8C8;
  --text: #1A0E04;
  --muted: #7A6248;
  --up: #1B7A2E;
  --dn: #B01010;
  --up-bg: #E8F5E9;
  --dn-bg: #FFEBEE;
  --r: 14px;
  --r-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0E0804;
    --surface: #1A0E04;
    --border: #3A2510;
    --text: #F5EDD8;
    --muted: #A08060;
    --gold-light: #2A1808;
    --gold-pale: #1E1208;
    --up-bg: #0D2E12;
    --dn-bg: #2E0D0D;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
}
 
/* ── TOP BAR ── */
.topbar {
  background: var(--brown);
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.hawk-logo {
  width: 42px; height: 42px;
  background: var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900;
  color: var(--brown);
  font-family: Georgia, serif;
  flex-shrink: 0;
}
.topbar-text h1 { font-size: 1rem; font-weight: 700; color: var(--gold); }
.topbar-text p { font-size: 0.72rem; color: rgba(242,193,78,0.65); margin-top: 1px; }
.record-pill {
  margin-left: auto;
  background: rgba(242,193,78,0.15);
  border: 1px solid rgba(242,193,78,0.3);
  color: var(--gold);
  font-size: 0.72rem; font-weight: 600;
  padding: 5px 10px; border-radius: 20px; white-space: nowrap;
}
 
/* ── SUMMARY CARDS ── */
.cards-row {
  display: flex; gap: 10px;
  padding: 14px 14px 6px;
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.cards-row::-webkit-scrollbar { display: none; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 11px 14px; min-width: 110px; flex-shrink: 0;
}
.stat-card .lbl { font-size: 0.63rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
.stat-card .val { font-size: 1.5rem; font-weight: 800; color: var(--gold-mid); line-height: 1; }
.stat-card .sub { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
 
/* ── CONTROLS ── */
.controls { padding: 8px 14px 8px; display: flex; gap: 8px; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 140px; position: relative; }
.search-wrap::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 0.8rem; }
input[type=text] {
  width: 100%; padding: 10px 10px 10px 32px;
  border: 1px solid var(--border); border-radius: var(--r-sm);
  background: var(--surface); color: var(--text); font-size: 0.9rem;
  outline: none; -webkit-appearance: none;
}
input[type=text]:focus { border-color: var(--gold-mid); }
.filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab {
  padding: 8px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); font-size: 0.78rem; font-weight: 500; cursor: pointer;
}
.tab.active { background: var(--brown); border-color: var(--brown); color: var(--gold); font-weight: 600; }
 
/* ── VIEW TOGGLE ── */
.view-toggle { padding: 0 14px 8px; display: flex; gap: 6px; }
.vtab {
  padding: 7px 14px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); font-size: 0.78rem; font-weight: 500;
  cursor: pointer; flex: 1; text-align: center;
}
.vtab.active { background: var(--gold-mid); border-color: var(--gold-mid); color: var(--brown); font-weight: 700; }
 
/* ── SORT BAR ── */
.sort-bar {
  padding: 0 14px 10px; display: flex; gap: 6px;
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.sort-bar::-webkit-scrollbar { display: none; }
.sort-btn {
  padding: 7px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); font-size: 0.72rem; font-weight: 500;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.sort-btn.active { background: var(--brown-mid); border-color: var(--brown-mid); color: var(--gold); }
 
/* ── PLAYER CARDS ── */
.player-list { padding: 0 14px 20px; display: flex; flex-direction: column; gap: 12px; }
 
.player-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(61,26,6,0.06);
}
 
.card-inner { display: flex; align-items: stretch; }
 
/* Avatar column */
.card-avatar-col {
  background: var(--brown);
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-width: 90px;
  flex-shrink: 0;
}
.avatar-circle {
  width: 58px; height: 58px;
  border-radius: 50%;
  background: var(--gold);
  border: 2.5px solid rgba(242,193,78,0.35);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
}
.av-num {
  font-size: 10px; font-weight: 700;
  color: var(--brown); opacity: 0.65; line-height: 1;
}
.av-initials {
  font-size: 20px; font-weight: 900;
  color: var(--brown); line-height: 1;
  font-family: Georgia, serif;
}
.card-name-col {
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: center; gap: 3px;
}
.card-name {
  font-size: 0.85rem; font-weight: 700;
  color: var(--gold); line-height: 1.2;
}
.card-pos-badge {
  font-size: 0.62rem; font-weight: 700;
  padding: 2px 7px; border-radius: 20px;
}
.pos-MF { background: rgba(200,225,255,0.15); color: #90CAFF; }
.pos-FW { background: rgba(255,210,185,0.15); color: #FFB088; }
.pos-DF { background: rgba(195,240,185,0.15); color: #88E078; }
.pos-RU { background: rgba(255,232,178,0.15); color: #FFD078; }
 
/* Stats column */
.card-stats-col {
  flex: 1;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 8px;
}
.stats-row { display: flex; gap: 4px; }
.stat-box { flex: 1; text-align: center; }
.stat-box .sv {
  font-size: 1.2rem; font-weight: 800;
  color: var(--text); line-height: 1;
}
.stat-box .sv.hi { color: var(--gold-mid); }
.stat-box .sl {
  font-size: 0.58rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .04em; margin-top: 2px;
}
.card-trend-row {
  background: var(--bg);
  border-radius: var(--r-sm);
  padding: 5px 8px;
  display: flex; align-items: center; gap: 6px;
}
.trend-badge {
  font-size: 0.68rem; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
}
.tr-up { background: var(--up-bg); color: var(--up); }
.tr-dn { background: var(--dn-bg); color: var(--dn); }
.tr-nu { background: var(--border); color: var(--muted); }
.trend-detail { font-size: 0.65rem; color: var(--muted); }
.delta-up { color: var(--up); font-weight: 600; }
.delta-dn { color: var(--dn); font-weight: 600; }
 
/* ── TABLE VIEW ── */
.table-wrap {
  margin: 0 14px 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow-x: auto; -webkit-overflow-scrolling: touch;
}
table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
thead th {
  background: var(--brown); color: var(--gold);
  padding: 9px 10px; text-align: right;
  font-size: 0.65rem; font-weight: 600; letter-spacing: .04em;
  white-space: nowrap; cursor: pointer; user-select: none;
}
thead th.lft { text-align: left; }
thead th:hover { background: var(--brown-mid); }
thead th.sorted { color: #FFE570; }
td { padding: 9px 10px; border-bottom: 1px solid var(--border); text-align: right; white-space: nowrap; }
td.lft { text-align: left; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--gold-pale); }
.t-hi { font-weight: 700; color: var(--gold-mid); }
.t-up { color: var(--up); font-weight: 600; }
.t-dn { color: var(--dn); font-weight: 600; }
.t-nu { color: var(--muted); }
.t-name { font-weight: 600; }
 
/* ── MISC ── */
.last-updated { text-align: center; font-size: 0.68rem; color: var(--muted); padding: 0 14px 28px; }
.last-updated a { color: var(--muted); }
.empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; }
 
@media (min-width: 700px) {
  .topbar,.cards-row,.controls,.view-toggle,.sort-bar,.last-updated { padding-left: 24px; padding-right: 24px; }
  .player-list { padding: 0 24px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); }
  .table-wrap { margin: 0 24px 24px; }
}
</style>

let DATA=null, curPos='', curSort='gl', curSortDir=-1, curView='cards', tSortKey='name', tSortDir=1;
 
function initials(name) {
  const parts = name.split(' ');
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}
 
function compute(raw) {
  return raw.map(p => {
    const da26 = p.di / p.gp;
    const isDebut = p.gp25 === 0;
    const isInj = !isDebut && p.gp25 < 3;
    const da25 = p.gp25 > 0 ? p.di25/p.gp25 : null;
    const glpg25 = p.gp25 > 0 ? p.gl25/p.gp25 : null;
    const tkpg25 = p.gp25 > 0 ? p.tk25/p.gp25 : null;
    let dda=null,dgl=null,dtk=null,trend=null;
    if (!isDebut && !isInj && da25 !== null) {
      dda = da26 - da25;
      dgl = (p.gl/p.gp) - glpg25;
      dtk = (p.tk/p.gp) - tkpg25;
      const cap = v => Math.max(-100,Math.min(100,v));
      const daPct = cap((dda/Math.max(da25,1))*100);
      const glPct = cap(glpg25>0.1 ? (dgl/glpg25)*100 : (p.gl/p.gp>0.05?50:0));
      const tkPct = cap((dtk/Math.max(tkpg25,0.5))*100);
      trend = (daPct+glPct+tkPct)/3;
    }
    return {...p,da26,da25,glpg25,tkpg25,dda,dgl,dtk,trend,isDebut,isInj};
  });
}
 
function load() {
  fetch('data.json')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => { DATA={...d,players:compute(d.players)}; init(); })
    .catch(() => { DATA={...EMBEDDED,players:compute(EMBEDDED.players)}; init(); });
}
 
function init() {
  const d = DATA;
  document.getElementById('subtitle').textContent = `Round ${d.round} · Updated ${d.updated}`;
  document.getElementById('record-pill').textContent = `${d.record} · ${d.position}`;
  const byGL=[...d.players].sort((a,b)=>b.gl-a.gl);
  const byDI=[...d.players].sort((a,b)=>b.di-a.di);
  const byTK=[...d.players].sort((a,b)=>b.tk-a.tk);
  const byDA=[...d.players].filter(p=>p.gp>=5).sort((a,b)=>b.da26-a.da26);
  document.getElementById('c-goals').textContent = byGL[0]?.gl??'—';
  document.getElementById('c-goals-name').textContent = byGL[0]?.name.split(' ').pop()??'';
  document.getElementById('c-disp').textContent = byDI[0]?.di??'—';
  document.getElementById('c-disp-name').textContent = byDI[0]?.name.split(' ').pop()??'';
  document.getElementById('c-tacks').textContent = byTK[0]?.tk??'—';
  document.getElementById('c-tacks-name').textContent = byTK[0]?.name.split(' ').pop()??'';
  document.getElementById('c-da').textContent = byDA[0]?.da26.toFixed(1)??'—';
  document.getElementById('c-da-name').textContent = byDA[0]?.name.split(' ').pop()??'';
  document.getElementById('c-wins').textContent = parseInt((d.record||'0W').split('W')[0]);
  const recordParts = (d.record||'').match(/(\d+)W[–-](\d+)L(?:[–-](\d+)D)?/);
  document.getElementById('c-wins-sub').textContent = recordParts
    ? `${recordParts[1]}W · ${recordParts[2]}L${recordParts[3] ? ' · ' + recordParts[3] + 'D' : ''}`
    : 'this season';
  const byTrend = [...d.players].filter(p=>p.trend!==null).sort((a,b)=>b.trend-a.trend);
  if (byTrend.length) {
    document.getElementById('c-trend-val').textContent = '+' + byTrend[0].trend.toFixed(0) + '%';
    document.getElementById('c-trend-name').textContent = byTrend[0].name.split(' ').pop();
  }
  document.getElementById('last-updated').innerHTML =
    `Stats to Round ${d.round} · Updated ${d.updated} · Source: <a href="https://afltables.com" target="_blank">AFL Tables</a>`;
  renderAll();
}
 
function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return DATA.players.filter(p =>
    (!curPos||p.pos===curPos) && (!q||p.name.toLowerCase().includes(q))
  );
}
 
function sortedBy(arr, key, dir) {
  return [...arr].sort((a,b) => {
    const av=a[key], bv=b[key];
    if(av===null&&bv===null) return 0;
    if(av===null) return 1; if(bv===null) return -1;
    if(typeof av==='string') return dir*av.localeCompare(bv);
    return dir*(av-bv);
  });
}
 
function renderAll() {
  if (!DATA) return;
  curView==='cards' ? renderCards() : renderTable();
}
 
function trendInfo(p) {
  if (p.isDebut) return ['tr-nu','Debut',''];
  if (p.isInj) return ['tr-nu',"Inj '25",''];
  if (p.trend===null) return ['tr-nu','—',''];
  const cls = p.trend>8?'tr-up':p.trend<-8?'tr-dn':'tr-nu';
  const arrow = p.trend>8?'↑ ':p.trend<-8?'↓ ':'↔ ';
  return [cls, arrow+Math.abs(p.trend).toFixed(0)+'%',
    p.trend>8?'Improving on 2025':p.trend<-8?'Down on 2025':'Similar to 2025'];
}
 
function dSign(v,d) { return v===null?'':((v>=0?'+':'')+v.toFixed(d)); }
 
function renderCards() {
  const list = sortedBy(filtered(), curSort, curSortDir);
  const el = document.getElementById('player-list');
  if (!list.length) { el.innerHTML='<div class="empty">No players match</div>'; return; }
  el.innerHTML = list.map(p => {
    const [tCls,tLabel,tDesc] = trendInfo(p);
    const glHi = p.gl>=10, daHi = p.da26>=20, tkHi = p.tk>=25;
    const ini = initials(p.name);
    const jnDisp = p.jn>0 ? p.jn : '';
 
    let detailHtml = '';
    if (!p.isDebut && !p.isInj && p.dda!==null) {
      const parts = [];
      if (Math.abs(p.dda)>0.3) parts.push(`<span class="${p.dda>=0?'delta-up':'delta-dn'}">${dSign(p.dda,1)} DA</span>`);
      if (Math.abs(p.dgl)>0.08) parts.push(`<span class="${p.dgl>=0?'delta-up':'delta-dn'}">${dSign(p.dgl,1)} Gls/g</span>`);
      if (Math.abs(p.dtk)>0.3) parts.push(`<span class="${p.dtk>=0?'delta-up':'delta-dn'}">${dSign(p.dtk,1)} Tcks/g</span>`);
      detailHtml = parts.slice(0,2).join(' · ');
    }
    if (!detailHtml) detailHtml = `<span style="color:var(--muted)">${tDesc}</span>`;
 
    return `<div class="player-card">
      <div class="card-inner">
        <div class="card-avatar-col">
          <div class="avatar-circle">
            <div class="av-num">${jnDisp}</div>
            <div class="av-initials">${ini}</div>
          </div>
          <div class="card-name-col">
            <div class="card-name">${p.name}</div>
            <div class="card-pos-badge pos-${p.pos}">${p.pos}</div>
          </div>
        </div>
        <div class="card-stats-col">
          <div class="stats-row">
            <div class="stat-box"><div class="sv ${glHi?'hi':''}">${p.gl}</div><div class="sl">Goals</div></div>
            <div class="stat-box"><div class="sv ${daHi?'hi':''}">${p.da26.toFixed(1)}</div><div class="sl">DA</div></div>
            <div class="stat-box"><div class="sv ${tkHi?'hi':''}">${p.tk}</div><div class="sl">Tcks</div></div>
            <div class="stat-box"><div class="sv">${p.gp}</div><div class="sl">Games</div></div>
          </div>
          <div class="card-trend-row">
            <span class="trend-badge ${tCls}">${tLabel}</span>
            <span class="trend-detail">${detailHtml}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}
 
function renderTable() {
  const arr = sortedBy(filtered(), tSortKey, tSortDir);
  document.querySelectorAll('[id^="ta-"]').forEach(el=>el.textContent='');
  const ar=document.getElementById('ta-'+tSortKey);
  if(ar) ar.textContent=tSortDir>0?' ↑':' ↓';
  const tbody=document.getElementById('table-body');
  if(!arr.length){tbody.innerHTML='<tr><td colspan="16" class="empty">No players</td></tr>';return;}
  const fmtD=(v,d,key)=>v===null?'<span class="t-nu">—</span>':`<span class="${v>=0?'t-up':'t-dn'}">${dSign(v,d)}</span>`;
  tbody.innerHTML=arr.map(p=>{
    const da25D=p.da25!==null?p.da25.toFixed(1):'—';
    const glpg25D=p.glpg25!==null?p.glpg25.toFixed(1):'—';
    const tkpg25D=p.tkpg25!==null?p.tkpg25.toFixed(1):'—';
    let trD='<span class="t-nu">—</span>';
    if(!p.isDebut&&!p.isInj&&p.trend!==null){
      const c=p.trend>8?'t-up':p.trend<-8?'t-dn':'t-nu';
      trD=`<span class="${c}">${p.trend>0?'↑':p.trend<0?'↓':'↔'} ${Math.abs(p.trend).toFixed(0)}%</span>`;
    } else if(p.isDebut) trD='<span class="t-nu">Debut</span>';
    else if(p.isInj) trD='<span class="t-nu">Inj</span>';
    return `<tr>
      <td class="lft t-name">${p.jn>0?p.jn+' ':''} ${p.name}</td>
      <td>${p.pos}</td><td>${p.gp}</td>
      <td class="${p.gl>=15?'t-hi':''}">${p.gl}</td>
      <td class="${p.tk>=30?'t-hi':''}">${p.tk}</td>
      <td class="${p.di>=200?'t-hi':''}">${p.di}</td>
      <td>${p.da26.toFixed(1)}</td><td>${p.ki}</td>
      <td>${p.isDebut?'—':p.gp25}</td>
      <td>${p.isDebut?'—':da25D}</td>
      <td>${p.isDebut?'—':glpg25D}</td>
      <td>${p.isDebut?'—':tkpg25D}</td>
      <td>${p.isDebut||p.isInj?'<span class="t-nu">—</span>':fmtD(p.dda,1)}</td>
      <td>${p.isDebut||p.isInj?'<span class="t-nu">—</span>':fmtD(p.dgl,2)}</td>
      <td>${p.isDebut||p.isInj?'<span class="t-nu">—</span>':fmtD(p.dtk,1)}</td>
      <td>${trD}</td>
    </tr>`;
  }).join('');
}
 
function setPos(el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');curPos=el.dataset.pos;renderAll();}
function setView(v,el){document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));el.classList.add('active');curView=v;document.getElementById('cards-view').style.display=v==='cards'?'':'none';document.getElementById('table-view').style.display=v==='table'?'':'none';document.getElementById('sort-bar').style.display=v==='cards'?'':'none';renderAll();}
function setSort(el){const k=el.dataset.key;if(curSort===k)curSortDir*=-1;else{curSort=k;curSortDir=-1;}document.querySelectorAll('.sort-btn').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderAll();}
function tSort(k){if(tSortKey===k)tSortDir*=-1;else{tSortKey=k;tSortDir=-1;}renderAll();}
 
load();
</script>
</body>
</html>
